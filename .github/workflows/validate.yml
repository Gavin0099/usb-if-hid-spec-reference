name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate source authority
        run: python scripts/validate_source_authority.py

      - name: Validate HID class request matrix
        run: python scripts/validate_hid_class_request_matrix.py

      - name: Validate HID descriptor fields matrix
        run: python scripts/validate_hid_descriptor_fields_matrix.py

      - name: Validate verification status
        run: python scripts/validate_verification_status.py

      - name: Validate source registry
        run: python scripts/validate_source_registry.py --receipt-out evidence/validation_receipt_source_registry.json

      - name: Validate contract files
        run: python scripts/validate_contract_files.py --receipt-out evidence/validation_receipt_contract_files.json

      - name: Validate memory records
        run: python scripts/validate_memory_records.py --receipt-out evidence/validation_receipt_memory_records.json

      - name: Validate HID governed surface manifest
        run: python scripts/validate_hid_governed_surface_manifest.py

      - name: Check HID table fingerprints
        run: python scripts/probe_table_fingerprint.py --mode check --manifest exports/hid_governed_surface_manifest.yaml --baseline-in evidence/table_fingerprint_baseline.jsonl

      - name: Consumer integration smoke
        run: python scripts/smoke_consumer_integration_fixtures.py

      - name: Run unit tests
        run: python -m unittest discover -s tests
