packet_identity:
  packet_id: hid_bNumDescriptors_verified_candidate
  packet_status: candidate
  review_level: 3
  target_claim_level: verified

governed_entry_binding:
  matrix: hid_descriptor_fields_matrix
  entry_id: hid_bNumDescriptors
  current_claim_level: verified
  current_evidence_status: not_verified

source_trace:
  source_id: hid_1_11
  source_section: "6.2.1"
  cited_source_authority_entry: data/source_authority.yaml current_imported_usage section 6.2.1
  quoted_or_paraphrased_basis: >
    HID 1.11 Section 6.2.1 is the registered authority for HID descriptor field
    identity. This candidate only binds the bNumDescriptors identity already
    present in the governed matrix and does not assert descriptor parser behavior.

claim_delta:
  can_claim_after_acceptance:
    - bNumDescriptors identity has an accepted source-traceable evidence packet.
    - The accepted packet is bound to hid_descriptor_fields_matrix.hid_bNumDescriptors.
  cannot_claim_after_acceptance:
    - firmware behavior correctness
    - OS input stack behavior
    - parser/runtime behavior
    - descriptor parser behavior
    - product-specific HID behavior
  forbidden_claim_check:
    - no firmware descriptor parsing correctness
    - no host descriptor interpretation behavior
    - no parser/runtime behavior
    - no descriptor semantic completeness

evidence_body:
  identity_statement: >
    bNumDescriptors is the HID descriptor field identity represented by
    hid_descriptor_fields_matrix.hid_bNumDescriptors.
  semantic_statement: >
    Candidate evidence is limited to descriptor field identity binding. It does
    not verify subordinate descriptor count handling, parser behavior, firmware
    implementation behavior, or host behavior.
  evidence_limits:
    - identity-level descriptor field binding only
    - no descriptor parser behavior
    - no firmware implementation correctness
    - no host OS behavior
    - no parser/runtime behavior

non_claims:
  firmware_implementation_correctness: not_claimed
  os_input_stack_behavior: not_claimed
  parser_runtime_behavior: not_claimed
  product_specific_hid_behavior: not_claimed

validation:
  source_authority_validator: python -X utf8 scripts/validate_source_authority.py
  matrix_validator: python -X utf8 scripts/validate_hid_descriptor_fields_matrix.py
  verification_status_validator: python -X utf8 scripts/validate_verification_status.py
  evidence_packet_validator: python -X utf8 scripts/validate_evidence_packet_schema.py
  unit_tests: python -m unittest discover -s tests

approval:
  requested_approval: Level 3 review for future accepted evidence packet status only.
  approver: pending
  approval_record: pending

residual_risk:
  remaining_unverified_behavior:
    - runtime descriptor parsing remains unverified
    - subordinate descriptor count handling remains unverified
    - host stack behavior remains unverified
  consumer_repo_escalation_boundary: >
    Consuming firmware repositories must separately verify any implementation
    behavior or product-specific descriptor policy derived from bNumDescriptors.
