gate_mode: batch
# batch mode: one Level 2/3 checkpoint produced, then pause for approval unless
#   the operator explicitly changes approved_batch to true.
# PR mode is explicit only and not the default.
mode_settings:
  batch_size: 1
  approved_batch: true
  approved_through: HID-REQ-1
  auto_advance_level2: false
  remarks: "HID-REQ-1 checkpoint approved; proceed to HID-REQ-2 with human checkpoint before each subsequent reviewed-draft boundary."
