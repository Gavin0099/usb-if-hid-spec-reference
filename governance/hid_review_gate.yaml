gate_mode: batch
# batch mode: one Level 2/3 checkpoint produced, then pause for approval unless
#   the operator explicitly changes approved_batch to true.
# PR mode is explicit only and not the default.
mode_settings:
  batch_size: 1
  approved_batch: true
  approved_through: HID-REQ-6
  auto_advance_level2: false
  remarks: "All HID-REQ-1 through HID-REQ-6 checkpoint closures are user-approved for reviewed-draft shell readiness; status promotions remain explicitly gated."
